name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday 06:00 UTC — catches CVEs disclosed since the last PR.
    - cron: '0 6 * * 1'

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  osv-scan:
    name: OSV-Scanner (Gradle deps)
    # OSV-Scanner is distributed as a REUSABLE WORKFLOW (not a step-level action).
    # The reusable workflow handles checkout, scan, and optional SARIF upload.
    # SARIF upload to GitHub Code Scanning requires GitHub Advanced Security on
    # private repos — we don't have GHAS, so upload-sarif is disabled. Findings
    # show up in the workflow run logs instead.
    #
    # Permissions: the reusable workflow declares all three below as required
    # at workflow level. GitHub refuses to start a caller that grants fewer,
    # even if the step that would consume them (SARIF upload) is disabled
    # via `upload-sarif: false`. So we grant the full set declaratively.
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.8
    permissions:
      actions: read
      contents: read
      security-events: write
    with:
      scan-args: |-
        --recursive
        --skip-git
        ./
      upload-sarif: false
      fail-on-vuln: true

  gitleaks:
    name: Gitleaks (secret scan)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          # Gitleaks needs full history to scan the PR diff against the base.
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE not required for personal accounts.
