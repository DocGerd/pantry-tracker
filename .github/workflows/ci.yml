name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Explicit least-privilege scope for the GITHUB_TOKEN (SR-18). The build job
# only reads — it doesn't post comments, publish releases, or push tags — so
# `contents: read` covers the checkout step and nothing else. Older repos
# default to read/write; this declaration is the only safe defense.
# `security.yml` declares the same scope per-job; this declaration is top-level
# so it covers every step uniformly.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      # SR-5 guard: a bare-flag `./gradlew wrapper --gradle-version X.Y.Z`
      # silently drops `distributionSha256Sum` from gradle-wrapper.properties.
      # The wrapper refuses to start on the *next* invocation, but by then the
      # diff has been reviewed and may have been merged. This step fails the
      # PR check at the point of regression — see docs/release/SHIPPING.md for
      # the atomic-update form maintainers must use.
      - name: Assert Gradle wrapper SHA is pinned (SR-5)
        run: |
          grep -q '^distributionSha256Sum=' gradle/wrapper/gradle-wrapper.properties \
            || { echo "::error file=gradle/wrapper/gradle-wrapper.properties::distributionSha256Sum missing — wrapper upgrade dropped the pin (see docs/release/SHIPPING.md)"; exit 1; }

      - name: Detect Gradle wrapper
        id: gate
        run: |
          if [ -f gradlew ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No Gradle wrapper yet -- milestone 0 (project skeleton) has not started. CI will activate once the Android skeleton lands."
          fi

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        if: steps.gate.outputs.ready == 'true'
        with:
          distribution: temurin
          java-version: '21'

      - uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699  # v4.0.1
        if: steps.gate.outputs.ready == 'true'

      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e  # v6.1.0
        if: steps.gate.outputs.ready == 'true'

      - name: Build, unit-test, lint
        if: steps.gate.outputs.ready == 'true'
        # `assembleDebugAndroidTest` compiles the Compose test sources without
        # running them (no emulator). Surfaces interface-evolution drift at PR
        # time — e.g. a FakeRepository forgetting a new ProductRepository method.
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon assembleDebug testDebugUnitTest lintDebug assembleDebugAndroidTest

      - name: Detekt (Kotlin static analysis)
        # `!cancelled()` keeps Detekt running even when the build/test/lint step
        # fails, so devs get static-analysis feedback in the same iteration as
        # compile errors instead of after the next push.
        # Bare `detekt` task scans all sources — do NOT swap to `detektDebug`
        # without verifying the per-variant task exists for the current toolchain;
        # missing-task failures only surface on CI.
        if: steps.gate.outputs.ready == 'true' && !cancelled()
        run: ./gradlew --no-daemon detekt

  androidTest:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a  # v2.37.0
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          script: ./gradlew :app:connectedDebugAndroidTest
