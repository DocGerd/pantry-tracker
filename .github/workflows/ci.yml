name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Explicit least-privilege scope for the GITHUB_TOKEN (SR-18). The build job
# only reads — it doesn't post comments, publish releases, or push tags — so
# `contents: read` covers the checkout step and nothing else. Older repos
# default to read/write; this declaration is the only safe defense.
# `security.yml` declares the same scope per-job; this declaration is top-level
# so it covers every step uniformly.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      # SR-138 wrapper-jar validation lives in its OWN workflow
      # (.github/workflows/wrapper-validation.yml), NOT here. It was split out
      # so OpenSSF Scorecard's Binary-Artifacts check reliably grants the
      # gradle-wrapper.jar exemption: Scorecard records only the first workflow
      # file its file-walk returns that runs the Gradle wrapper-validation
      # action (in practice ci.yml sorts before wrapper-validation.yml, though
      # that ordering is GitHub-tarball behavior, not a Scorecard guarantee), and
      # requires a *successful* run of it on the branch-HEAD commit — which this
      # heavy job (coupled to its ~10-min emulator androidTest) could not
      # reliably provide, and whose `cancel-in-progress` cancelled HEAD's push
      # run on rapid merges. The dedicated workflow runs on push + PR; a tampered
      # wrapper jar is still surfaced as a red check before merge (and, once
      # registered on the branch-protection rulesets, a merge-blocking required
      # check). The SR-5 guard below is a SEPARATE concern (it validates the
      # distribution pin in gradle-wrapper.properties, not the jar) and stays.

      # SR-5 guard: a bare-flag `./gradlew wrapper --gradle-version X.Y.Z`
      # silently drops `distributionSha256Sum` from gradle-wrapper.properties.
      # The wrapper refuses to start on the *next* invocation, but by then the
      # diff has been reviewed and may have been merged. This step fails the
      # PR check at the point of regression — see docs/release/SHIPPING.md for
      # the atomic-update form maintainers must use.
      - name: Assert Gradle wrapper SHA is pinned (SR-5)
        run: |
          grep -q '^distributionSha256Sum=' gradle/wrapper/gradle-wrapper.properties \
            || { echo "::error file=gradle/wrapper/gradle-wrapper.properties::distributionSha256Sum missing — wrapper upgrade dropped the pin (see docs/release/SHIPPING.md)"; exit 1; }

      - name: Detect Gradle wrapper
        id: gate
        run: |
          if [ -f gradlew ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No Gradle wrapper yet -- milestone 0 (project skeleton) has not started. CI will activate once the Android skeleton lands."
          fi

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        if: steps.gate.outputs.ready == 'true'
        with:
          distribution: temurin
          java-version: '21'

      - uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699  # v4.0.1
        if: steps.gate.outputs.ready == 'true'

      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e  # v6.1.0
        if: steps.gate.outputs.ready == 'true'

      - name: Build, unit-test, lint
        if: steps.gate.outputs.ready == 'true'
        # `assembleDebugAndroidTest` compiles the Compose test sources without
        # running them (no emulator). Surfaces interface-evolution drift at PR
        # time — e.g. a FakeRepository forgetting a new ProductRepository method.
        # `:detekt-rules:test` runs the ErrorToneRule proof test (SR-78) so a
        # regression that makes the custom detekt rule inert fails the PR.
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon assembleDebug testDebugUnitTest :detekt-rules:test lintDebug assembleDebugAndroidTest

      - name: Detekt (Kotlin static analysis)
        # `!cancelled()` keeps Detekt running even when the build/test/lint step
        # fails, so devs get static-analysis feedback in the same iteration as
        # compile errors instead of after the next push.
        # Bare `detekt` task scans all sources — do NOT swap to `detektDebug`
        # without verifying the per-variant task exists for the current toolchain;
        # missing-task failures only surface on CI.
        if: steps.gate.outputs.ready == 'true' && !cancelled()
        run: ./gradlew --no-daemon detekt

      # SR-180: coverage reporting/verification deliberately does NOT live here.
      # A JVM-only report in this job shows a misleading ~18.74% (it cannot see
      # the instrumented emulator tests), so the real COMBINED measurement was
      # moved to the `androidTest` emulator job below, where the connected
      # coverage `.ec` exists. The `build` required check therefore stays purely
      # build / unit-test / lint / detekt.

  androidTest:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      # SR-180: explicit SDK setup so the post-emulator coverage gradle steps
      # below (jacocoTestReport / jacocoTestCoverageVerification) don't rely on
      # the runner image's preinstalled SDK + ANDROID_HOME env persisting after
      # the emulator-runner action returns. Pinned to the same SHA as the `build`
      # job's setup-android.
      - uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699  # v4.0.1

      # #202: the `build` job caches Gradle via setup-gradle but this emulator job
      # did not, so it paid a cold dependency download and re-assembled the app +
      # test APK from scratch (the "double-assemble"). Adding the same SHA-pinned
      # action restores the dependency cache on any branch immediately; build-cache
      # reuse (recompile FROM-CACHE) lands once a default-branch run has populated
      # the cache (develop/PR runs are read-only by default). Coverage-neutral.
      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e  # v6.1.0

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # #201: cache the AVD Quick Boot snapshot so each run resumes a warm emulator
      # (~6-15s) instead of paying a full cold boot (the long pole, ~563s of an
      # ~11m job). Two-step pattern from the reactivecircus/android-emulator-runner
      # README: (1) restore the cache; (2) on a MISS only, boot once and save a
      # snapshot; (3) the real run resumes from it. The cache key encodes
      # api-level/target/arch so a system-image bump invalidates it. actions/cache
      # is SHA-pinned per the repo's Pinned-Dependencies convention. Coverage-neutral
      # — the run step still executes :app:connectedDebugAndroidTest unchanged.
      - name: AVD cache
        id: avd-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-35-google_apis-x86_64

      - name: Create AVD snapshot (cache miss only)
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a  # v2.37.0
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "Generated AVD snapshot for caching."

      # The run step MUST switch the action default `-no-snapshot` → `-no-snapshot-save`
      # (load the cached snapshot on boot but don't overwrite it on exit); with the
      # default `-no-snapshot` the cached snapshot is never loaded and the cache is a
      # silent no-op. `force-avd-creation: false` keeps the restored AVD from being
      # clobbered. See the #201 spike gotcha.
      - uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a  # v2.37.0
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: ./gradlew :app:connectedDebugAndroidTest

      # SR-180: the emulator-runner step above ran connectedDebugAndroidTest with
      # enableAndroidTestCoverage=true, leaving the instrumented coverage `.ec`
      # under app/build/outputs/code_coverage/. It also leaves the Android SDK on
      # the runner and Java is already set up by the setup-java step above, so we
      # can run Gradle directly here. jacocoTestReport only dependsOn
      # testDebugUnitTest (it does NOT re-run the connected tests), so this
      # produces the JVM unit `.exec` on this runner and merges it with the
      # connected `.ec` into one COMBINED report.
      - name: Merge coverage (unit + instrumented) and report
        if: ${{ !cancelled() }}
        run: ./gradlew --no-daemon :app:testDebugUnitTest :app:jacocoTestReport

      - name: Upload merged JaCoCo XML
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: jacoco-coverage-xml
          path: app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          if-no-files-found: error

      # #198: publish the SAME merged (unit + instrumented) JaCoCo report to
      # Codecov, which powers the README coverage badge and PR coverage
      # annotations. `fail_ci_if_error: false` (also the action default, set
      # explicitly here as a guard) keeps a not-yet-configured CODECOV_TOKEN or
      # a transient Codecov outage from failing the build — until the maintainer
      # registers the repo on codecov.io and adds the CODECOV_TOKEN secret, this
      # step is a non-failing no-op and the badge reads "unknown". Token-based
      # upload (no `id-token: write`), so Token-Permissions stays 10/10.
      - name: Upload coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354  # v6.0.1
        with:
          files: app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      # INFORMATIONAL gate (SR-180). This `androidTest` job is NOT a required
      # status check and NO ruleset was edited, so a coverage regression below
      # 0.80 shows red here WITHOUT blocking merges — a deliberate maintainer
      # decision to avoid coupling merges to emulator reliability. The OpenSSF
      # Silver test_statement_coverage80 MUST is satisfied by the demonstrated
      # combined 86.85% instruction coverage, not by a merge-blocking check.
      - name: Verify coverage ≥ 80% (non-required signal)
        if: ${{ !cancelled() }}
        run: ./gradlew --no-daemon :app:jacocoTestCoverageVerification
