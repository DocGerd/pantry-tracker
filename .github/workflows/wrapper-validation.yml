name: Wrapper validation

# Dedicated, lightweight validation of the checked-in
# `gradle/wrapper/gradle-wrapper.jar` against Gradle's official wrapper-jar
# hash list (the SR-138 guard, split out of ci.yml). Exists to make OpenSSF
# Scorecard's Binary-Artifacts check reliably grant the gradle-wrapper.jar
# exemption (10/10 instead of 9/10).
#
# Why a SEPARATE workflow rather than the step that used to live in ci.yml:
#
#   1. Scorecard's exemption (checks/raw/binary_artifact.go ->
#      gradleWrapperValidated) is granted only when the LATEST COMMIT on the
#      scanned branch has a SUCCESSFUL run of the workflow that runs the Gradle
#      wrapper-validation action. Scorecard records only the FIRST such workflow
#      file its file-walk returns (checkWorkflowValidatesGradleWrapper stops at
#      the first match), so the action MUST NOT also appear as a `uses:` step in
#      ci.yml — otherwise Scorecard checks ci.yml's runs and ignores this file.
#      In practice GitHub's source tarball yields files in lexicographic order
#      (ci.yml before wrapper-validation.yml), but that ordering is GitHub
#      behavior, not a Scorecard guarantee. Scorecard matches `uses:` steps via
#      actionlint, so a prose mention of the action name (like ci.yml's comment)
#      does NOT count — only a real `uses:` step does.
#
#   2. Tying the exemption to ci.yml coupled it to ci.yml's ~10-min emulator
#      `androidTest` job: an emulator flake on a develop-HEAD commit denied the
#      exemption (observed Binary-Artifacts 9/10). This job is ~30s and never
#      touches the emulator, so develop HEAD reliably gets a green run.
#
# Runs on `pull_request` too, so a tampered wrapper jar is still surfaced as a
# red check before merge.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Deliberately NO `concurrency` block. ci.yml's `cancel-in-progress: true`
# (keyed on github.ref) was the root cause: a second merge to develop cancelled
# the push run of the previous HEAD commit, leaving it without the *successful*
# run the exemption requires. Letting every ~30s run finish costs negligible
# minutes and guarantees each default-branch HEAD commit keeps its own green run.

# Least-privilege GITHUB_TOKEN: this job only checks out and validates — it
# never writes. Matches the top-level scope in ci.yml / security.yml.
permissions:
  contents: read

jobs:
  validate:
    name: Validate Gradle wrapper jar (SR-138)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: gradle/actions/wrapper-validation@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e  # v6.1.0
