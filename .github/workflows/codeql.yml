name: CodeQL

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Weekly schedule catches new CodeQL queries / CVE rules disclosed since
    # the last PR landed. Wednesday 06:00 UTC — deliberately offset from
    # security.yml's Monday slot so dependency-CVE forensics and source-code
    # findings don't pile into the same morning's GitHub-Actions queue.
    - cron: '0 6 * * 3'

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # CodeQL's combined language for the JVM ecosystem. A single
        # `java-kotlin` database covers both languages — listing them
        # separately is a deprecated configuration.
        language: [java-kotlin]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7211b7c8077ea37d8641b6271f6a365a22a5fbfa  # v4.36.0
        with:
          languages: ${{ matrix.language }}
          # Build mode: source-only analysis (no Gradle invocation).
          # The first cut of this workflow ran `:app:assembleDebug --no-daemon`
          # under a CodeQL LD_PRELOAD tracer — the Android build itself
          # succeeded but the Kotlin daemon compiles out-of-process and was
          # not traced, producing an empty source archive at finalize-time
          # ("no source code seen during build"). `build-mode: none` skips
          # the trace step entirely and scans Kotlin/Java sources directly,
          # which is the supported path for Android projects and removes the
          # whole Gradle / setup-java / autobuild surface from this workflow.
          build-mode: none
          # security-and-quality bundles the security-extended queries plus
          # maintainability/quality lints — broader than the default suite,
          # appropriate for a small app where we want maximum signal.
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7211b7c8077ea37d8641b6271f6a365a22a5fbfa  # v4.36.0
        with:
          category: "/language:${{ matrix.language }}"
