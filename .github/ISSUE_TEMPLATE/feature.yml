name: Feature request
description: Propose a new feature or enhancement
title: "[feat] "
labels: ["enhancement"]

body:
  - type: textarea
    id: problem_statement
    attributes:
      label: Problem statement
      description: What problem are we solving? What's the user need?
    validations:
      required: true

  - type: textarea
    id: proposed_approach
    attributes:
      label: Proposed approach
      description: How should we solve it?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional — any other approaches considered?
    validations:
      required: false

  - type: checkboxes
    id: scope_check
    attributes:
      label: Scope check
      description: Pantry Tracker is deliberately single-user, offline-first, and privacy-preserving (no accounts, no analytics, no sync). See the README and arc42 §1.
      options:
        - label: I've read the project scope and this fits the single-user, offline-first, no-accounts model (or I explain below why an exception is warranted).
          required: false
